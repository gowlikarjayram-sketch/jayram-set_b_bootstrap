<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Registration</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <style>
    body{
      background:white;
      font-family:Arial, sans-serif;
    }

    .register-section{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 0;
    }
   </style>
</head>
<body>

<section class="register-section">
  

        
        <div class="col-md-7 form-side">
          <h2 class="mb-4 fw-bold text-center">Event Registration</h2>

          <form>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" placeholder="Enter first name">
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" placeholder="Enter last name">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-control" placeholder="Enter phone number">
            </div>

            <div class="mb-3">
              <label class="form-label">Select Event Type</label>
              <select class="form-select">
                <option>Workshop</option>
                <option>Seminar</option>
                <option>Hackathon</option>
                <option>Conference</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="4" placeholder="Write something..."></textarea>
            </div>

            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="check">
              <label class="form-check-label" for="check">
                I agree to the terms & conditions
              </label>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-register">
              Register Now
            </button>

          </form>
        </div>

      </div>
    </div>
  </div>
  </section>

  <table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">First</th>
      <th scope="col">Last</th>
      <th scope="col">Handle</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <th scope="row">1</th>
      <td>jayram</td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <th scope="row">2</th>
      <td>rohit</td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <th scope="row">3</th>
      <td>anand</td>
      <td></td>
      <td></td>
    </tr>
  </tbody>
</table>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
